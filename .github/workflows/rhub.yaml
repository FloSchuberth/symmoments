other-platforms:
    needs: setup
    if: ${{ needs.setup.outputs.platforms != '[]' }}
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.label }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.platforms) }}

    steps:
      - uses: r-hub/actions/checkout@v1
      - uses: r-hub/actions/setup-r@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}
      - uses: r-hub/actions/platform-info@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
          
      # ─── FIXED TINYTEX INSTALLATION STEP ────────────────────────────────────
      - name: Install and Register TinyTeX
        run: |
          Rscript -e "install.packages('tinytex', repos = 'https://cloud.r-project.org')"
          Rscript -e "tinytex::install_tinytex(force = TRUE)"
          # Find where TinyTeX put pdflatex and force-inject it into the GitHub Actions PATH
          BIN_PATH=$(Rscript -e "cat(tinytex::tinytex_root())" | sed 's/\\/\//g')
          if [ -d "$BIN_PATH/bin/windows" ]; then
            echo "$BIN_PATH/bin/windows" >> $GITHUB_PATH
          elif [ -d "$BIN_PATH/bin/universal-darwin" ]; then
            echo "$BIN_PATH/bin/universal-darwin" >> $GITHUB_PATH
          else
            # Fallback searching for any bin folder inside the root
            find "$BIN_PATH" -type d -name "bin" -exec echo {} >> $GITHUB_PATH \;
          fi
        shell: bash
      # ────────────────────────────────────────────────────────────────────────

      - uses: r-hub/actions/setup-deps@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}
      - uses: r-hub/actions/run-check@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}